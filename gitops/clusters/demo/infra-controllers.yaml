apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure/controllers
  prune: true
  # wait: true => Flux wartet, bis alle HelmReleases Ready sind (CRDs installiert),
  # bevor die abhängige "infra-configs"-Kustomization läuft.
  wait: true
