apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-configs
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./gitops/infrastructure/configs
  prune: true
  wait: true
  # Erst wenn die Controller (cert-manager/kyverno CRDs) bereitstehen.
  dependsOn:
    - name: infra-controllers
