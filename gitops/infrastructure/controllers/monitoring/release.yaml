apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "61.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
  values:
    grafana:
      enabled: true
      defaultDashboardsEnabled: true
      # Dashboards aus observability/dashboards werden per Sidecar geladen (Label unten).
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    prometheus:
      prometheusSpec:
        retention: 7d
        # Alle ServiceMonitors/PrometheusRules im Cluster übernehmen, nicht nur
        # die mit passendem Release-Label.
        serviceMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
    alertmanager:
      alertmanagerSpec:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
