apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Tier 2 "configs": Custom Resources, die die CRDs aus Tier 1 voraussetzen
# (ClusterIssuer -> cert-manager, ClusterPolicy -> kyverno) sowie der
# app-Namespace und dessen RBAC. Läuft per dependsOn erst nach den Controllern.
resources:
  - app-namespace.yaml
  - cluster-issuer.yaml
  - kyverno-policies.yaml
  - app-team-role.yaml
