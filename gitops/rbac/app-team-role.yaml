# Namespace-scoped Kubernetes RBAC — bindet eine AAD-Gruppe (nicht Einzelnutzer)
# an eine Editor-Rolle im Namespace "app". Greift zusammen mit azure_rbac_enabled.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-team-editor
  namespace: app
rules:
  - apiGroups: ["apps", ""]
    resources: ["deployments", "pods", "services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-team-editor-binding
  namespace: app
subjects:
  # Bindung an AAD-Gruppe (objectId), nicht an einzelne Nutzer.
  - kind: Group
    name: "<AAD_GROUP_OBJECT_ID>"
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: app-team-editor
  apiGroup: rbac.authorization.k8s.io
